<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited - Envelope Animation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #f5f5f0 0%, #e8e4dc 50%, #d4cfc4 100%);
            overflow: hidden;
        }

        /* Hero Viewport */
        .hero-viewport {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle background pattern */
        .hero-viewport::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(180, 160, 140, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(180, 160, 140, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Envelope Wrapper */
        .envelope-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 200%);
            width: 1080px;
            height: 998px;
        }

        /* SVG Layers */
        .envelope-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .svg-back {
            z-index: 1;
        }

        .svg-letter {
            z-index: 2;
        }

        .svg-front {
            z-index: 3;
        }

        /* Flap transform origin for rotation */
        #flap {
            transform-origin: 50% 100%;
            transform-box: fill-box;
        }

        /* Responsive adjustments */
        /* Màn hình lớn >= 1920px (21 inch trở lên) */
        @media (min-width: 1920px) {
            .envelope-wrapper {
                width: 1440px;
                height: 1140px; /* Giữ tỷ lệ 1260:998 */
            }
        }

        /* Màn hình 1330px - 1919px: dùng kích thước gốc 1260x998 */

        /* Màn hình nhỏ hơn 1330px */
        @media (max-width: 1330px) {
            .envelope-wrapper {
                width: 90vw;
                height: calc(90vw * 0.792); /* Giữ tỷ lệ 1260:998 */
            }
        }

        @media (max-width: 768px) {
            .envelope-wrapper {
                width: 95vw;
                height: calc(95vw * 0.792);
            }
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            text-align: center;
            color: #8a8279;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .scroll-indicator::after {
            content: '';
            display: block;
            width: 1px;
            height: 30px;
            background: #8a8279;
            margin: 10px auto 0;
            animation: scrollPulse 1.5s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { transform: scaleY(1); opacity: 1; }
            50% { transform: scaleY(0.5); opacity: 0.5; }
        }
    </style>
</head>

    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>
        // Wait for DOM to load
        document.addEventListener('DOMContentLoaded', () => {
            // Get elements
            const envelopeWrapper = document.querySelector('.envelope-wrapper');
            const letter = document.querySelector('.svg-letter');
            const letterGroup = document.querySelector('#letter');
            const flap = document.querySelector('#flap');
            const scrollIndicator = document.querySelector('.scroll-indicator');

            // ============================================
            // Initial State Setup
            // ============================================
            // Letter starts pushed down inside envelope (hidden)
            gsap.set(letterGroup, { y: 350 });

            // Create main timeline
            const mainTimeline = gsap.timeline({
                defaults: {
                    ease: 'power2.out'
                },
                delay: 0.3 // Wait a moment before starting
            });

            // ============================================
            // Stage 1: Entrance - Envelope slides up to center
            // ============================================
            mainTimeline.to(envelopeWrapper, {
                y: '-40%',
                duration: 1.5,
                ease: 'power3.out'
            });

            // ============================================
            // Stage 2: Unfold - Flap opens
            // ============================================
            mainTimeline.to(flap, {
                rotateX: -160,
                duration: 0.6,
                ease: 'power2.inOut'
            }, '+=0.1');

            // ============================================
            // Stage 3: Letter Rise - Letter emerges from inside
            // ============================================
            mainTimeline.to(letterGroup, {
                y: -80,
                duration: 1,
                ease: 'power3.out'
            }, '-=0.3');

            // ============================================
            // Stage 4: Show scroll indicator
            // ============================================
            mainTimeline.to(scrollIndicator, {
                opacity: 1,
                duration: 0.5
            }, '-=0.3');
        });
    </script>
