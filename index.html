<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="asset/css/main.css">
</head>

<body>
    <nav>
        <img src="asset/img/logo.svg" alt="logo">
        <div class="right">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="12" viewBox="0 0 16 12" fill="none">
                <path
                    d="M15.8076 10.8555C15.4869 11.5317 14.7982 11.9999 14 12H2C1.20168 12 0.512139 11.5318 0.191406 10.8555L6.76074 6.8291L8 7.58594L9.23828 6.8291L15.8076 10.8555ZM5.80273 6.24316L0 9.7998V2.69629L5.80273 6.24316ZM16 9.7998L10.1963 6.24316L16 2.69629V9.7998ZM14 0C14.9515 0.000172489 15.748 0.664366 15.9502 1.55469L8 6.41406L0.0488281 1.55469C0.251076 0.664224 1.04832 0 2 0H14Z"
                    fill="#2A2A2A" />
            </svg>
            <p class="body-lg"> your invitation card</p>
        </div>
    </nav>

    <div class="hero-viewport">
        <div class="envelope-wrapper">
            <!-- Layer 1: Back (background + flap) -->
            <svg class="envelope-layer svg-back" viewBox="0 0 1260 983" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="pattern-background" patternUnits="userSpaceOnUse" width="1260" height="983" x="0" y="0">
                        <image href="asset/img/back-background.webp" width="1260" height="983" preserveAspectRatio="none"/>
                    </pattern>
                    <pattern id="pattern-flap" patternUnits="userSpaceOnUse" width="1260" height="983" x="0" y="0">
                        <image href="asset/img/flap.webp" width="1260" height="983" preserveAspectRatio="none"/>
                    </pattern>
                </defs>
                <g id="back">
                    <path id="background" d="M76.3794 482.553C73.3656 463.569 85.8164 446.413 104.692 443.54L1026.77 303.184C1046.65 300.158 1066.07 314.062 1069.81 333.99L1142.65 722.602C1146.37 742.419 1133.12 760.505 1113.21 762.787L174.784 870.393C154.886 872.675 136.029 858.286 132.875 838.415L76.3794 482.553Z" fill="url(#pattern-background)"/>
                    <path id="flap" d="M481.076 27.2367C490.833 19.0184 504.769 17.0295 517.392 22.0522L1064.96 239.92C1099.68 253.733 1097.27 302.461 1061.59 308.132L150.31 452.984L69.7035 463.933C33.6794 468.825 10.6075 423.493 37.5657 400.787L481.076 27.2367Z" fill="url(#pattern-flap)"/>
                </g>
            </svg>

            <!-- Layer 2: Letter -->
            <svg class="envelope-layer svg-letter" viewBox="0 0 1260 983" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="pattern-letter" patternUnits="userSpaceOnUse" width="1260" height="983" x="0" y="0">
                        <image href="asset/img/letter.webp" width="1260" height="983" preserveAspectRatio="none"/>
                    </pattern>
                </defs>
                <g id="letter">
                    <path id="letter-background" d="M126.408 265.499C125.078 259.006 129.33 253.065 135.904 252.229L921.517 152.293C928.091 151.456 934.499 156.042 935.829 162.534L1030.5 624.675C1031.83 631.168 1027.57 637.109 1021 637.945L235.387 737.881C228.813 738.718 222.405 734.132 221.075 727.64L126.408 265.499Z" fill="url(#pattern-letter)"/>
                    <g id="letter-text" aria-hidden="true" transform="rotate(-8.42 578 460)">
                        <text x="578" y="425" text-anchor="middle" fill="#0038bc" class="heading-2">You're invited</text>
                        <text x="578" y="495" text-anchor="middle" fill="#2a2a2a" class="heading-3">, but not yet</text>
                        <rect class="stamp-placeholder" x="700" y="248" width="240" height="56" fill="none" stroke="#002d97" stroke-dasharray="6 4" stroke-width="1" rx="4"/>
                        <text x="820" y="284" text-anchor="middle" class="heading-6 stamp-placeholder-text">Place stamp here</text>
                    </g>
                </g>
            </svg>

            <!-- Layer 3: Front -->
            <svg class="envelope-layer svg-front" viewBox="0 0 1260 983" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="pattern-front" patternUnits="userSpaceOnUse" width="1260" height="983" x="0" y="0">
                        <image href="asset/img/front.webp" width="1260" height="983" preserveAspectRatio="none"/>
                    </pattern>
                </defs>
                <g id="front">
                    <path id="upper" d="M1088.43 256.593C1082.79 237.317 1055.44 237.451 1049.99 256.781L995.618 449.599C994.162 454.762 990.692 459.124 985.989 461.705L818.335 553.684C816.148 554.884 813.755 555.665 811.28 555.985L356.007 614.853C353.371 615.194 350.694 615.006 348.131 614.3L142.897 557.775C137.623 556.322 133.174 552.773 130.587 547.954L57.7445 412.29C47.0284 392.332 16.6185 402.76 20.4052 425.094L111.704 963.576C113.49 974.108 123.237 981.378 133.841 980.086L1236.6 845.77C1248.86 844.277 1256.85 832.148 1253.38 820.3L1088.43 256.593Z" fill="url(#pattern-front)"/>
                </g>
            </svg>
        </div>
    </div>

    <section class="stamps-section">
        <h1 id="stamps-section-title" class="heading-1">A 3-year<br>journey</h1>
        <div class="stamps-grid">
            <img src="asset/stamp/phatla/stamp-phatla-1.png" alt="Phat La 1" data-title="Phat La 1" class="stamp-item">
            <img src="asset/stamp/phatla/stamp-phatla-2.png" alt="Phat La 2" data-title="Phat La 2" class="stamp-item">
            <img src="asset/stamp/phatla/stamp-phatla-3.png" alt="Phat La 3" data-title="Phat La 3" class="stamp-item">
            <img src="asset/stamp/phatla/stamp-phatla-4.png" alt="Phat La 4" data-title="Phat La 4" class="stamp-item">
            <img src="asset/stamp/phatla/stamp-phatla-5.png" alt="Phat La 5" data-title="Phat La 5" class="stamp-item">
            <img src="asset/stamp/phatla/stamp-phatla-6.png" alt="Phat La 6" data-title="Phat La 6" class="stamp-item">
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const envelopeWrapper = document.querySelector('.envelope-wrapper');
            const letterGroup = document.querySelector('#letter');
            const flap = document.querySelector('#flap');

            gsap.set(letterGroup, { y: 350 });

            const mainTimeline = gsap.timeline({
                defaults: { ease: 'power2.out' },
                delay: 0.3
            });

            mainTimeline.to(envelopeWrapper, {
                y: '-40%',
                duration: 1.5,
                ease: 'power3.out'
            });

            mainTimeline.to(flap, {
                rotateX: -160,
                duration: 0.6,
                ease: 'power2.inOut'
            }, '+=0.1');

            mainTimeline.to(letterGroup, {
                y: -20,
                duration: 1,
                ease: 'power3.out'
            }, '-=0.3');
        });

        // STAMPS SECTION LOGIC
        document.addEventListener('DOMContentLoaded', () => {
            const stampsSection = document.querySelector('.stamps-section');
            const stampsTitle = document.getElementById('stamps-section-title');
            const stampsGrid = document.querySelector('.stamps-grid');
            const stampItems = Array.from(document.querySelectorAll('.stamp-item'));
            const defaultTitle = stampsTitle.innerHTML; // Use innerHTML to preserve <br>

            // Predefined rotations for each stamp (fixed)
            const fixedRotations = [-5, 3, -7, 4, -3, 6];

            // 1. Position stamps in circular layout (desktop only)
            function positionStampsCircular() {
                if (window.innerWidth > 768) {
                    const radius = 380;
                    const centerX = stampsGrid.offsetWidth / 2;
                    const centerY = stampsGrid.offsetHeight / 2;

                    stampItems.forEach((stamp, index) => {
                        const angle = (index / stampItems.length) * 2 * Math.PI - Math.PI / 2;
                        let x = centerX + radius * Math.cos(angle) - stamp.offsetWidth / 2;
                        let y = centerY + radius * Math.sin(angle) - stamp.offsetHeight / 2;
                        
                        // Custom offsets for specific stamps
                        if (index === 0) { // phat la 1
                            y += 50;
                        }
                        if (index === 3) { // phat la 4
                            y -= 50;
                        }
                        
                        // Use fixed rotation
                        const rotation = fixedRotations[index] || 0;
                        
                        stamp.style.left = `${x}px`;
                        stamp.style.top = `${y}px`;
                        stamp.style.transform = `rotate(${rotation}deg)`;
                        stamp.dataset.baseRotation = rotation;
                    });
                }
            }

            positionStampsCircular();
            window.addEventListener('resize', positionStampsCircular);

            // 3. Hover interaction: change title simply
            // Helper function: Format title với 2 từ đầu, còn lại xuống hàng
            function formatTitle(text) {
                const words = text.split(' ');
                if (words.length <= 2) return text;
                const firstLine = words.slice(0, 2).join(' ');
                const secondLine = words.slice(2).join(' ');
                return `${firstLine}<br>${secondLine}`;
            }
            
            stampItems.forEach(stamp => {
                const hoverHandler = () => {
                    const rawTitle = stamp.dataset.title || defaultTitle;
                    const newTitle = formatTitle(rawTitle);
                    stampsTitle.innerHTML = newTitle;
                };

                const resetHandler = () => {
                    stampsTitle.innerHTML = defaultTitle;
                };

                stamp.addEventListener('mouseenter', hoverHandler);
                stamp.addEventListener('mouseleave', resetHandler);

                // Mobile: tap to change title
                stamp.addEventListener('click', (e) => {
                    if (window.innerWidth <= 768) {
                        e.preventDefault();
                        hoverHandler();
                        setTimeout(resetHandler, 2000);
                    }
                });
            });

            // 4. Entrance animation with Intersection Observer
            let hasAnimated = false;
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !hasAnimated) {
                        hasAnimated = true;
                        
                        // Title slides up
                        stampsTitle.classList.add('visible');
                        
                        // Stamps appear one by one in circular order with stagger
                        stampItems.forEach((stamp, index) => {
                            setTimeout(() => {
                                stamp.classList.add('visible');
                            }, 300 + index * 150);
                        });
                    }
                });
            }, { threshold: 0.3 });

            observer.observe(stampsSection);
        });

        // NAV HIDE/SHOW ON SCROLL
        document.addEventListener('DOMContentLoaded', () => {
            const nav = document.querySelector('nav');
            let lastScrollY = window.scrollY;
            let ticking = false;

            function updateNavVisibility() {
                const currentScrollY = window.scrollY;
                
                if (currentScrollY > lastScrollY && currentScrollY > 100) {
                    // Scrolling down & past 100px -> hide nav
                    nav.classList.add('nav-hidden');
                } else if (currentScrollY < lastScrollY) {
                    // Scrolling up -> show nav
                    nav.classList.remove('nav-hidden');
                }
                
                lastScrollY = currentScrollY;
                ticking = false;
            }

            window.addEventListener('scroll', () => {
                if (!ticking) {
                    window.requestAnimationFrame(updateNavVisibility);
                    ticking = true;
                }
            });
        });
    </script>
</body>

</html>
