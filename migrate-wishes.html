<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Migrate Wishes → Firestore</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #111; color: #eee; }
    h1 { color: #4af; }
    button { padding: 12px 28px; font-size: 16px; background: #0038bc; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin: 8px 4px; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #log { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 16px; margin-top: 20px; min-height: 200px; white-space: pre-wrap; font-size: 13px; line-height: 1.6; }
    .ok  { color: #4f4; }
    .err { color: #f44; }
    .info{ color: #4af; }
    .warn{ color: #fa4; }
  </style>
</head>
<body>

<h1>🚚 Migrate Wishes: Google Sheets → Firestore</h1>
<p>Chạy file này <strong>1 lần duy nhất</strong> để copy wishes cũ từ Google Sheets sang Firestore.<br>
Sau khi xong, bạn có thể xoá file này.</p>

<button id="btn-start">Bắt đầu migrate</button>
<button id="btn-clear" style="background:#555;">Xoá log</button>

<div id="log">Bấm "Bắt đầu migrate" để chạy...</div>

<!-- Firebase SDK compat -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyARbP8L1JlrPeS2rOt8S9tvAb9c7AQVQNU',
  authDomain:        'lamdi-bb1b5.firebaseapp.com',
  projectId:         'lamdi-bb1b5',
  storageBucket:     'lamdi-bb1b5.firebasestorage.app',
  messagingSenderId: '625477205650',
  appId:             '1:625477205650:web:24fc184cc00090ccc8b04b',
};

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwYFidWreUFr4sbbjO32osWNm90An3IfuuCfbKcT_ZVGeSdRDSyYIOB2F_cSSqhpe7YAQ/exec';

const HOSTS = ['phatla', 'lefacteur', 'hoangkaa', 'huukhai', 'quocbao', 'vinhnghi', 'kietluong', 'meifanpkng', 'jahy'];
// ───────────────────────────────────────────────────────────────────────────

const logEl = document.getElementById('log');

function log(msg, type = '') {
  const span = document.createElement('span');
  if (type) span.className = type;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

document.getElementById('btn-clear').addEventListener('click', () => { logEl.innerHTML = ''; });

document.getElementById('btn-start').addEventListener('click', async () => {
  const btn = document.getElementById('btn-start');
  btn.disabled = true;
  logEl.innerHTML = '';

  // Init Firebase
  let app, db;
  try {
    app = firebase.initializeApp(FIREBASE_CONFIG);
  } catch(e) {
    app = firebase.app();
  }
  db = firebase.firestore(app);
  log('✅ Firebase khởi tạo thành công', 'ok');

  let totalMigrated = 0;
  let totalSkipped  = 0;
  let totalErrors   = 0;

  for (const host of HOSTS) {
    log(`\n── Host: ${host} ──`, 'info');

    // 1. Fetch từ Apps Script
    let wishes = [];
    try {
      const url = `${APPS_SCRIPT_URL}?action=getWishes&host=${encodeURIComponent(host)}`;
      const res = await fetch(url, { method: 'GET', mode: 'cors' });
      const data = await res.json();
      if (data.success && Array.isArray(data.wishes)) {
        wishes = data.wishes;
        log(`   📥 Fetch được ${wishes.length} wishes từ Sheets`, wishes.length > 0 ? 'ok' : 'warn');
      } else {
        log(`   ⚠️  Không có dữ liệu hoặc lỗi: ${data.message || JSON.stringify(data)}`, 'warn');
      }
    } catch(e) {
      log(`   ❌ Lỗi fetch Sheets: ${e.message}`, 'err');
      totalErrors++;
      continue;
    }

    if (wishes.length === 0) {
      log(`   ⏭  Bỏ qua (không có wish)`, 'warn');
      totalSkipped++;
      continue;
    }

    // 2. Kiểm tra wishes đã có trong Firestore chưa (tránh duplicate)
    let existingCount = 0;
    try {
      const snap = await db.collection('wishes').where('host', '==', host).get();
      existingCount = snap.size;
    } catch(e) {
      log(`   ⚠️  Không check được Firestore: ${e.message}`, 'warn');
    }

    if (existingCount > 0) {
      log(`   ⚠️  Firestore đã có ${existingCount} wish cho host này. Bỏ qua để tránh duplicate.`, 'warn');
      log(`      Nếu muốn ghi đè, hãy xoá collection trước.`, 'warn');
      totalSkipped++;
      continue;
    }

    // 3. Ghi từng wish vào Firestore
    let hostMigrated = 0;
    for (const w of wishes) {
      try {
        await db.collection('wishes').add({
          host:      host,
          guestName: w.guestName || 'Guest',
          message:   w.message   || '',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          migratedFrom: 'google-sheets'
        });
        hostMigrated++;
      } catch(e) {
        log(`   ❌ Lỗi ghi wish "${w.guestName}": ${e.message}`, 'err');
        totalErrors++;
      }
    }

    log(`   ✅ Đã migrate ${hostMigrated}/${wishes.length} wishes`, 'ok');
    totalMigrated += hostMigrated;
  }

  log(`\n══════════════════════════════`, 'info');
  log(`✅ Hoàn thành! Tổng: ${totalMigrated} migrated | ${totalSkipped} skipped | ${totalErrors} lỗi`, totalErrors > 0 ? 'warn' : 'ok');
  log(`\nBạn có thể vào Firestore Console để kiểm tra collection "wishes".`, 'info');
  log(`Sau khi xác nhận OK, hãy xoá file migrate-wishes.html này.`, 'warn');

  btn.disabled = false;
});
</script>
</body>
</html>
